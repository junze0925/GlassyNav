<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>导航首页</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 数据管理脚本 -->
    <script src="data.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        accent: '#8b5cf6',
                        dark: '#1f2937',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto { content-visibility: auto; }
            .backdrop-blur-md { backdrop-filter: blur(6px); }
            .card-shadow { box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05); }
            .card-hover { transition: transform 0.2s ease-in-out, box-shadow 0.2s ease-in-out; }
            .card-hover:hover { transform: translateY(-2px); box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04); }
        }
    </style>
    <style>
        body {
            background: url('static/image/bjt.png') no-repeat center center/cover;
            transition: background 0.5s ease;
            min-height: 100vh;
        }
        body.dark::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }
        .card-hover { transition: transform 0.3s ease, box-shadow 0.3s ease; }
        .card-hover:hover { transform: translateY(-5px); }
        /* 夜晚模式字体适配 */
        body.dark .text-gray-800, body.dark .text-gray-900, body.dark .text-gray-700,
        body.dark h1, body.dark h2, body.dark h3, body.dark h4 { color: #f1f5f9 !important; }
        body.dark .text-gray-500, body.dark .text-gray-600 { color: #cbd5e1 !important; }
        body.dark .bg-white\/80, body.dark .bg-white\/90 { color: #f1f5f9 !important; }
    </style>
</head>
<body class="relative font-sans text-gray-800 dark:text-white transition-custom">
    <!-- 顶部导航栏 -->
    <nav class="fixed top-0 left-0 right-0 z-50 px-4 py-3 backdrop-blur-md bg-white/70 dark:bg-gray-900/70 transition-custom">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <i class="fa fa-compass text-primary text-2xl"></i>
                <h1 class="text-xl font-bold">导航首页</h1>
            </div>
            <div class="flex items-center gap-4">
                <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-custom">
                    <!-- 🌙 月亮图标：浅色显示，深色隐藏 -->
                    <i class="fa fa-moon-o dark:hidden text-xl text-gray-800"></i>
                    <!-- ☀️ 太阳图标：浅色隐藏，深色显示，并强制变白 -->
                    <i class="fa fa-sun-o hidden dark:block text-xl text-gray-800 dark:text-white"></i>
                </button>
                
                <button id="search-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-custom">
                    <!-- 🔍 搜索图标：浅色深灰，深色强制变白 -->
                    <i class="fa fa-search text-xl text-gray-800 dark:text-white"></i>
                </button>
                
                <a href="admin.html" class="hidden md:flex items-center gap-1 px-3 py-1.5 rounded-full bg-primary/10 text-primary hover:bg-primary/20 transition-custom">
                    <!-- ⚙️ 管理图标和文字 -->
                    <i class="fa fa-cog text-gray-800 dark:text-white"></i>
                    <span class="text-gray-800 dark:text-white">管理</span>
                </a>
            </div>
        </div>
    </nav>

    <!-- 搜索框 -->
    <div id="search-container" class="fixed top-16 left-0 right-0 z-40 container mx-auto px-4 hidden">
        <div class="relative">
            <input type="text" id="search-input" placeholder="搜索链接..." class="w-full py-3 px-5 pr-12 rounded-full bg-white/90 dark:bg-gray-800/90 backdrop-blur-md border border-gray-200 dark:border-gray-700 focus:outline-none focus:ring-2 focus:ring-primary/50">
            <button id="search-btn" class="absolute right-4 top-1/2 transform -translate-y-1/2 text-gray-500 dark:text-gray-400 hover:text-primary dark:hover:text-primary">
                <i class="fa fa-search text-xl"></i>
            </button>
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="container mx-auto px-4 pt-32 pb-20">
        <!-- 欢迎区域 -->
        <div class="text-center mb-10">
            <h1 class="text-4xl md:text-5xl font-bold mb-3" id="greeting">早上好，欢迎回来</h1>
            <p class="text-lg text-gray-600 dark:text-gray-300" id="date-display">2023年1月1日 星期日</p>
        </div>

        <!-- ================================================== -->
        <!-- 🟢 核心改变：所有分类（快速访问、常用网站等）动态渲染 -->
        <!-- ================================================== -->
        <div id="categories-container" class="space-y-10">
            <!-- 所有分类将由 JavaScript 自动生成并插入到这里 -->
        </div>

        <!-- 联系信息 -->
        <div class="mt-12">
            <div class="flex justify-between items-center mb-4">
                <h2 class="text-2xl font-bold">联系我们</h2>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- 微信 -->
                <div class="card-hover bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-2xl p-6 shadow-lg hover:shadow-xl transition-custom">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-full bg-green-100 dark:bg-green-900 flex items-center justify-center">
                            <img src="static/picture/wx.png" alt="微信Logo" class="w-8 h-8">
                        </div>
                        <h3 class="text-xl font-bold">客服微信</h3>
                    </div>
                    <div class="flex flex-col gap-3">
                        <button onclick="copyText('888888')" class="w-full py-2 px-4 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-custom flex justify-between items-center">
                            <span>复制微信：888888</span>
                            <i class="fa fa-copy"></i>
                        </button>
                        <button onclick="openWechat()" class="w-full py-2 px-4 rounded-lg bg-green-500 text-white hover:bg-green-600 transition-custom flex justify-center items-center gap-2">
                            <i class="fa fa-weixin"></i>
                            <span>打开微信</span>
                        </button>
                    </div>
                </div>
                <!-- QQ -->
                <div class="card-hover bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-2xl p-6 shadow-lg hover:shadow-xl transition-custom">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-full bg-blue-100 dark:bg-blue-900 flex items-center justify-center">
                            <img src="static/picture/QQ.png" alt="QQ Logo" class="w-8 h-8">
                        </div>
                        <h3 class="text-xl font-bold">客服QQ</h3>
                    </div>
                    <div class="flex flex-col gap-3">
                        <button onclick="copyText('88888888')" class="w-full py-2 px-4 rounded-lg bg-gray-100 dark:bg-gray-700 hover:bg-gray-200 dark:hover:bg-gray-600 transition-custom flex justify-between items-center">
                            <span>复制QQ：88888888</span>
                            <i class="fa fa-copy"></i>
                        </button>
                        <button onclick="openQQ('88888888')" class="w-full py-2 px-4 rounded-lg bg-blue-500 text-white hover:bg-blue-600 transition-custom flex justify-center items-center gap-2">
                            <i class="fa fa-qq"></i>
                            <span>打开QQ</span>
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <!-- 页脚 -->
    <footer class="fixed bottom-0 left-0 right-0 py-4 text-center text-sm text-gray-600 dark:text-gray-300 backdrop-blur-md bg-white/70 dark:bg-gray-900/70">
        <div class="container mx-auto">
            <p>© 2023-2025 导航首页</p>
            <p class="mt-1">Powered by <span class="text-primary">导航系统</span></p>
        </div>
    </footer>

    <!-- 返回顶部按钮 -->
    <button id="back-to-top" class="fixed bottom-20 right-6 w-12 h-12 rounded-full bg-primary text-white flex items-center justify-center shadow-lg hover:bg-primary/90 transition-custom opacity-0 invisible">
        <i class="fa fa-arrow-up"></i>
    </button>

    <script>
        // 初始化页面
        document.addEventListener('DOMContentLoaded', function() {
            // 加载动态分类列表
            renderCategories();
            
            setGreeting();
            updateDateDisplay();
            checkDarkMode();
            initEventListeners();
        });

        // 🟢 核心渲染函数：将所有分类动态输出到页面
        function renderCategories() {
            const container = document.getElementById('categories-container');
            container.innerHTML = '';
            const categories = getCategories();

            if (!categories || categories.length === 0) {
                container.innerHTML = `<div class="text-center text-gray-500 dark:text-gray-400 py-10">暂无分类，请前往后台添加</div>`;
                return;
            }

            categories.forEach(category => {
                const section = document.createElement('div');
                section.className = 'mb-10';

                // 1. 分类标题栏 + 右侧统一【管理】按钮
                const header = document.createElement('div');
                header.className = 'flex justify-between items-center mb-4';
                header.innerHTML = `
                    <h2 class="text-2xl font-bold flex items-center gap-2">
                        <i class="fa ${category.icon || 'fa-folder'} text-primary"></i>
                        ${category.name}
                    </h2>
                    <a href="admin.html" class="text-primary hover:text-primary/80 transition-custom flex items-center gap-1 cursor-pointer">
                        <span>管理</span>
                        <i class="fa fa-angle-right"></i>
                    </a>
                `;
                section.appendChild(header);

                const grid = document.createElement('div');
                const isQuickAccess = category.name === '快速访问';

                // 2. 判断使用“快速访问”的小圆卡片布局，还是“常规分类”的大方块布局
                if (isQuickAccess) {
                    grid.className = 'grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-6 gap-4';
                } else {
                    grid.className = 'grid grid-cols-1 md:grid-cols-2 gap-6';
                }

                // 3. 渲染链接
                if (!category.links || category.links.length === 0) {
                    grid.innerHTML = `<div class="col-span-full text-center text-gray-500 dark:text-gray-400 py-4 bg-gray-50 dark:bg-gray-700/30 rounded-xl">暂无链接，点击右上角「管理」前往后台添加</div>`;
                } else {
                    category.links.forEach(link => {
                        const item = document.createElement('a');
                        item.href = link.url;
                        item.target = '_blank';
                        item.className = 'card-hover cursor-pointer transition-custom';

                        if (isQuickAccess) {
                            // 快速访问：FontAwesome 图标（如果后台没有指定 icon，默认显示 fa-link）
                            item.className += ' bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-2xl p-4 flex flex-col items-center justify-center text-center shadow-lg hover:shadow-xl';
                            item.innerHTML = `
                                <div class="w-12 h-12 rounded-full bg-gray-100 dark:bg-gray-700 flex items-center justify-center mb-3 text-primary text-xl">
                                    <i class="fa ${link.icon || 'fa-link'}"></i>
                                </div>
                                <span class="text-sm font-medium">${link.name}</span>
                            `;
                        } else {
                            // 常规分类：图标 URL / Favicon
                            item.className += ' bg-white/80 dark:bg-gray-800/80 backdrop-blur-md rounded-2xl p-6 shadow-lg hover:shadow-xl flex items-start gap-4';
                            const favicon = link.favicon || 'static/image/default.png';
                            item.innerHTML = `
                                <div class="w-12 h-12 rounded-full overflow-hidden border-2 border-gray-200 dark:border-gray-700 flex-shrink-0">
                                    <img src="${favicon}" alt="${link.name}" class="w-full h-full object-cover" onerror="this.src='static/image/default.png'">
                                </div>
                                <div class="flex-1 min-w-0">
                                    <h3 class="text-lg font-bold mb-1 truncate">${link.name}</h3>
                                    <p class="text-gray-600 dark:text-gray-300 text-sm truncate">${category.name}</p>
                                </div>
                                <i class="fa fa-angle-right text-gray-400 mt-1 flex-shrink-0"></i>
                            `;
                        }
                        grid.appendChild(item);
                    });
                }
                section.appendChild(grid);
                container.appendChild(section);
            });
        }

        // 设置问候语
        function setGreeting() {
            const greeting = document.getElementById('greeting');
            const hour = new Date().getHours();
            if (hour < 6) { greeting.textContent = '夜深了，注意休息'; 
            } else if (hour < 12) { greeting.textContent = '早上好，欢迎回来'; 
            } else if (hour < 14) { greeting.textContent = '中午好，开始工作'; 
            } else if (hour < 18) { greeting.textContent = '下午好，继续努力'; 
            } else if (hour < 22) { greeting.textContent = '晚上好，准备休息'; 
            } else { greeting.textContent = '夜深了，注意休息'; }
        }

        // 更新日期显示
        function updateDateDisplay() {
            const dateDisplay = document.getElementById('date-display');
            const now = new Date();
            dateDisplay.textContent = now.toLocaleDateString('zh-CN', { year: 'numeric', month: 'long', day: 'numeric', weekday: 'long' });
        }

        // 检测系统暗黑模式
        function checkDarkMode() {
            const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark' || (!savedTheme && prefersDark)) {
                document.body.classList.add('dark');
            } else {
                document.body.classList.remove('dark');
            }
        }

        // 初始化事件监听
        function initEventListeners() {
            const themeToggle = document.getElementById('theme-toggle');
            themeToggle.addEventListener('click', function() {
                document.body.classList.toggle('dark');
                localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
            });

            const searchToggle = document.getElementById('search-toggle');
            const searchContainer = document.getElementById('search-container');
            searchToggle.addEventListener('click', function() {
                searchContainer.classList.toggle('hidden');
                if (!searchContainer.classList.contains('hidden')) document.getElementById('search-input').focus();
            });

            document.addEventListener('click', function(event) {
                if (!searchToggle.contains(event.target) && !searchContainer.contains(event.target) && !searchContainer.classList.contains('hidden')) {
                    searchContainer.classList.add('hidden');
                }
            });

            const backToTop = document.getElementById('back-to-top');
            window.addEventListener('scroll', function() {
                if (window.scrollY > 300) {
                    backToTop.classList.remove('opacity-0', 'invisible');
                    backToTop.classList.add('opacity-100', 'visible');
                } else {
                    backToTop.classList.remove('opacity-100', 'visible');
                    backToTop.classList.add('opacity-0', 'invisible');
                }
            });
            backToTop.addEventListener('click', function() { window.scrollTo({ top: 0, behavior: 'smooth' }); });

            const searchInput = document.getElementById('search-input');
            const searchBtn = document.getElementById('search-btn');
            function handleSearch() {
                const keyword = searchInput.value.trim();
                if (keyword) alert(`搜索关键词: ${keyword}`);
            }
            searchBtn.addEventListener('click', handleSearch);
            searchInput.addEventListener('keypress', function(event) { if (event.key === 'Enter') handleSearch(); });

            window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
                const savedTheme = localStorage.getItem('theme');
                if (!savedTheme) document.body.classList.toggle('dark', e.matches);
            });
        }

        function copyText(textToCopy) {
            navigator.clipboard.writeText(textToCopy).then(() => showToast(`已复制: ${textToCopy}`)).catch(() => {
                const tempInput = document.createElement('input');
                tempInput.value = textToCopy; document.body.appendChild(tempInput);
                tempInput.select();
                try { document.execCommand('copy'); showToast(`已复制: ${textToCopy}`); } catch (err) { showToast('复制失败，请手动复制', true); } 
                finally { document.body.removeChild(tempInput); }
            });
        }

        function openWechat() { window.location.href = 'weixin://'; setTimeout(() => { if (!document.hidden) showToast('已尝试跳转到微信，请手动搜索微信号'); }, 500); }
        function openQQ(qqNumber) { window.location.href = `tencent://message/?uin=${qqNumber}&Site=Q&Menu=yes`; setTimeout(() => { if (!document.hidden) showToast('已尝试打开QQ，请手动搜索QQ号'); }, 500); }

        function showToast(message, isError = false) {
            const existingToast = document.getElementById('toast-notification');
            if (existingToast) existingToast.remove();
            const toast = document.createElement('div');
            toast.id = 'toast-notification';
            toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg text-white font-medium shadow-lg z-50 transition-all duration-300 opacity-0`;
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => { toast.classList.add('opacity-100'); }, 10);
            setTimeout(() => { toast.classList.remove('opacity-100'); setTimeout(() => { toast.remove(); }, 300); }, 3000);
        }
    </script>
</body>
</html>
