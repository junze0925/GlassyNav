<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <!-- 数据管理脚本 -->
    <script src="data.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        secondary: '#10b981',
                        accent: '#8b5cf6',
                        danger: '#ef4444',
                        warning: '#f59e0b',
                        info: '#06b6d4',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }
            .backdrop-blur-md {
                backdrop-filter: blur(12px);
            }
            .form-input-focus {
                @apply ring-2 ring-primary ring-opacity-50 outline-none;
            }
            .btn-primary {
                @apply bg-primary text-white px-4 py-2 rounded-lg hover:bg-primary/90 transition-all flex items-center justify-center gap-2;
            }
            .btn-secondary {
                @apply bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-white px-4 py-2 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 transition-all flex items-center justify-center gap-2;
            }
            .btn-danger {
                @apply bg-danger text-white px-4 py-2 rounded-lg hover:bg-danger/90 transition-all flex items-center justify-center gap-2;
            }
            .btn-success {
                @apply bg-secondary text-white px-4 py-2 rounded-lg hover:bg-secondary/90 transition-all flex items-center justify-center gap-2;
            }
        }
    </style>
    <style>
        body {
            background: url('static/image/bjt.png') no-repeat center center/cover;
            transition: background 0.5s ease;
            min-height: 100vh;
        }
        
        /* 夜晚模式蒙版 */
        body.dark::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: -1;
        }
        /* === 🌙 后台管理夜晚模式图标适配补丁 === */
        body.dark nav button i {
            color: #f1f5f9 !important;
        }
        body.dark nav .group i {
            color: #f1f5f9 !important;
        }/* === 🌙 管理后台核心区域夜晚模式字体适配补丁 === */
        /* 1. 修复分类的计数 (如: (4个链接)) */
        body.dark .text-gray-500, 
        body.dark .text-gray-400,
        body.dark .text-gray-600 {
            color: #9ca3af !important; /* 浅灰色，保证清晰可见 */
        }

        /* 2. 修复链接列表里的名称和地址 */
        body.dark .links-container .font-medium {
            color: #f3f4f6 !important; /* 偏白色，高亮 */
        }
        body.dark .links-container .text-gray-500,
        body.dark .links-container .text-gray-600 {
            color: #9ca3af !important; /* 确保里面的 URL 或副标题清晰 */
        }

        /* 3. 修复“暂无链接”的提示文字 */
        body.dark .p-4.text-gray-500,
        body.dark .text-center.text-gray-500 {
            color: #9ca3af !important;
        }
    </style>
</head>
<body class="relative font-sans text-gray-800 dark:text-white transition-all duration-300">
    <!-- 登录容器 -->
    <div id="login-container" class="fixed inset-0 flex items-center justify-center p-4">
        <div class="bg-white/90 dark:bg-gray-900/90 backdrop-blur-md rounded-2xl p-8 max-w-md w-full shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-primary/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i class="fa fa-cog text-primary text-2xl"></i>
                </div>
                <h2 class="text-2xl font-bold">管理后台</h2>
                <p class="text-gray-600 dark:text-gray-400">请输入管理员账号和密码</p>
            </div>
            
            <form id="login-form" class="space-y-4">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">用户名</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 dark:text-gray-400">
                            <i class="fa fa-user"></i>
                        </span>
                        <input type="text" id="username" name="username" class="w-full pl-10 pr-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入用户名" required>
                    </div>
                </div>
                
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">密码</label>
                    <div class="relative">
                        <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-gray-500 dark:text-gray-400">
                            <i class="fa fa-lock"></i>
                        </span>
                        <input type="password" id="password" name="password" class="w-full pl-10 pr-10 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入密码" required>
                        <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 flex items-center pr-3 text-gray-500 dark:text-gray-400">
                            <i class="fa fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="w-full py-3 px-4 bg-primary text-white font-medium rounded-lg hover:bg-primary/90 transition-all flex items-center justify-center gap-2">
                    <i class="fa fa-sign-in"></i>
                    <span>登录</span>
                </button>
            </form>
            
            <div class="mt-6 text-center text-sm text-gray-600 dark:text-gray-400">
                <p>默认账号密码: admin / admin123</p>
            </div>
        </div>
    </div>

    <!-- 管理面板容器 -->
    <div id="admin-container" class="hidden min-h-screen">
        <!-- 顶部导航栏 -->
       <!-- 顶部导航栏 -->
        <header class="sticky top-0 z-50 backdrop-blur-md bg-white/80 dark:bg-gray-900/80 border-b border-gray-200 dark:border-gray-800">
            <div class="container mx-auto px-4 py-3">
                <div class="flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <i class="fa fa-cog text-primary text-2xl"></i>
                        <h1 class="text-xl font-bold">管理后台</h1>
                    </div>
                    
                    <div class="flex items-center gap-4">
                        <button id="theme-toggle" class="p-2 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-all">
                            <i class="fa fa-moon-o dark:hidden text-gray-800"></i>
                            <i class="fa fa-sun-o hidden dark:block text-gray-800 dark:text-white"></i>
                        </button>
                        
                        <div class="relative group">
                            <button class="flex items-center gap-2 p-1 rounded-full hover:bg-gray-200 dark:hover:bg-gray-700 transition-all">
                                <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-700 flex items-center justify-center">
                                    <i class="fa fa-user text-gray-800 dark:text-white"></i>
                                </div>
                                <span class="hidden md:inline text-sm font-medium text-gray-800 dark:text-white">管理员</span>
                                <i class="fa fa-angle-down text-xs text-gray-800 dark:text-white"></i>
                            </button>
                            
                            <div class="absolute right-0 mt-2 w-48 bg-white dark:bg-gray-800 rounded-lg shadow-lg border border-gray-200 dark:border-gray-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-300 z-50">
                                <div class="py-2">
                                    <button id="logout-btn" class="w-full text-left px-4 py-2 text-sm text-red-600 dark:text-red-400 hover:bg-gray-100 dark:hover:bg-gray-700 transition-all flex items-center gap-2">
                                        <i class="fa fa-sign-out"></i>
                                        <span>退出登录</span>
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </header>

        <!-- 主内容区 -->
        <div class="container mx-auto px-4 py-6">
            <!-- 标签页导航 -->
            <div class="mb-6 border-b border-gray-200 dark:border-gray-700">
                <nav class="flex overflow-x-auto space-x-4 scrollbar-hide">
                    <button class="admin-tab active border-b-2 border-transparent text-gray-500 hover:text-primary hover:border-primary dark:text-gray-400 dark:hover:text-primary whitespace-nowrap px-1 py-4 font-medium text-sm" data-target="links-management">
                        <i class="fa fa-link mr-2"></i>网站链接管理
                    </button>
                    <button class="admin-tab border-b-2 border-transparent text-gray-500 hover:text-primary hover:border-primary dark:text-gray-400 dark:hover:text-primary whitespace-nowrap px-1 py-4 font-medium text-sm" data-target="settings">
                        <i class="fa fa-cog mr-2"></i>设置
                    </button>
                    <button class="admin-tab border-b-2 border-transparent text-gray-500 hover:text-primary hover:border-primary dark:text-gray-400 dark:hover:text-primary whitespace-nowrap px-1 py-4 font-medium text-sm" data-target="data-management">
                        <i class="fa fa-database mr-2"></i>数据管理
                    </button>
                </nav>
            </div>

            <!-- 标签页内容 -->
            <!-- 网站链接管理 -->
            <div id="links-management" class="tab-content">
                <div class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-6 mb-6">
                    <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
                        <div>
                            <h2 class="text-xl font-bold">网站链接管理</h2>
                            <p class="text-gray-600 dark:text-gray-400 text-sm">管理网站分类和链接</p>
                        </div>
                        <button onclick="showAddCategoryModal()" class="btn-primary">
                            <i class="fa fa-plus"></i>
                            <span>添加分类</span>
                        </button>
                    </div>
                    
                    <div id="categories-list" class="space-y-6">
                        <!-- 分类列表将通过JavaScript动态生成 -->
                    </div>
                </div>
            </div>

            <!-- 设置 -->
            <div id="settings" class="tab-content hidden">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- 联系信息设置 -->
                    <div class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-6">
                        <h3 class="text-lg font-bold mb-4">联系信息</h3>
                        <div class="space-y-4">
                            <div>
                                <label for="wechat-input" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">微信账号</label>
                                <input type="text" id="wechat-input" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入微信账号">
                            </div>
                            <div>
                                <label for="qq-input" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">QQ账号</label>
                                <input type="text" id="qq-input" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入QQ账号">
                            </div>
                            <div class="pt-2">
                                <button onclick="saveContactInfo()" class="btn-primary w-full">
                                    <i class="fa fa-save"></i>
                                    <span>保存设置</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 主题设置 -->
                    <div class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-6">
                        <h3 class="text-lg font-bold mb-4">主题设置</h3>
                        <div class="space-y-4">
                            <div>
                                <label for="default-theme" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">默认主题</label>
                                <select id="default-theme" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus">

                                    <option value="light">浅色模式</option>
                                    <option value="dark">深色模式</option>
                                </select>
                            </div>
                            <div>
                                <label class="flex items-center">
                                    <input type="checkbox" id="custom-bg" class="rounded text-primary focus:ring-primary h-5 w-5">
                                    <span class="ml-2 text-sm text-gray-700 dark:text-gray-300">使用自定义背景</span>
                                </label>
                            </div>
                            <div id="bg-image-container" class="hidden">
                                <label for="bg-image" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">背景图片URL</label>
                                <input type="text" id="bg-image" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入背景图片URL">
                            </div>
                            <div class="pt-2">
                                <button onclick="saveThemeSettings()" class="btn-primary w-full">
                                    <i class="fa fa-save"></i>
                                    <span>保存设置</span>
                                </button>
                            </div>
                        </div>
                    </div>

                    <!-- 搜索设置 -->
                    <div class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-6">
                        <h3 class="text-lg font-bold mb-4">搜索设置</h3>
                        <div class="space-y-4">
                            <div>
                                <label for="search-engine" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">默认搜索引擎</label>
                                <select id="search-engine" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus">
                                    <option value="baidu">百度</option>
                                    <option value="google">Google</option>
                                    <option value="bing">Bing</option>
                                    <option value="so">360搜索</option>
                                    <option value="custom">自定义</option>
                                </select>
                            </div>
                            <div id="custom-search-container" class="hidden">
                                <label for="custom-search-url" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">自定义搜索URL</label>
                                <input type="text" id="custom-search-url" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入自定义搜索URL，包含 {q} 作为搜索关键词占位符">
                            </div>
                            <div class="pt-2">
                                <button onclick="saveSearchSettings()" class="btn-primary w-full">
                                    <i class="fa fa-save"></i>
                                    <span>保存设置</span>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 数据管理 -->
            <div id="data-management" class="tab-content hidden">
                <div class="bg-white/80 dark:bg-gray-900/80 backdrop-blur-md rounded-xl shadow-lg border border-gray-200 dark:border-gray-700 p-6">
                    <h3 class="text-lg font-bold mb-6">数据管理</h3>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        <div class="space-y-4">
                            <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-lg">
                                <h4 class="font-medium mb-2">导出数据</h4>
                                <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">将所有数据导出为JSON文件</p>
                                <button id="export-btn" class="btn-secondary w-full">
                                    <i class="fa fa-download"></i>
                                    <span>导出数据</span>
                                </button>
                            </div>
                            
                            <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-lg">
                                <h4 class="font-medium mb-2">导入数据</h4>
                                <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">从JSON文件导入数据</p>
                                <div class="relative">
                                    <button class="btn-secondary w-full">
                                        <i class="fa fa-upload"></i>
                                        <span>选择文件</span>
                                    </button>
                                    <input type="file" id="import-input" accept=".json" class="absolute inset-0 w-full h-full opacity-0 cursor-pointer">
                                </div>
                            </div>
                        </div>
                        
                        <div class="bg-gray-50 dark:bg-gray-800 p-4 rounded-lg">

                            <p class="text-sm text-gray-600 dark:text-gray-400 mb-3">清空所有数据，请谨慎操作！</p>
                            <button id="clear-data-btn" class="btn-danger w-full">
                                <i class="fa fa-trash"></i>
                                <span>清空数据</span>
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 分类模态框 -->
    <div id="category-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/50"></div>
        <div class="relative bg-white dark:bg-gray-900 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 max-w-md w-full mx-auto">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-bold" id="category-modal-title">添加分类</h3>
                    <button onclick="closeModal('category-modal')" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-all">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
            </div>
            
            <form id="category-form" class="p-6 space-y-4">
                <input type="hidden" id="category-id" value="">
                
                <div>
                    <label for="category-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">分类名称</label>
                    <input type="text" id="category-name" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入分类名称" required>
                </div>
                
                <div>
                    <label for="category-icon" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">分类图标</label>
                    <input type="text" id="category-icon" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="Font Awesome图标类名，如：fa-folder" value="fa-folder">

                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal('category-modal')" class="btn-secondary">

                    </button>
                    <button type="submit" class="btn-primary">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- 链接模态框 -->
    <div id="link-modal" class="fixed inset-0 z-50 flex items-center justify-center p-4 hidden">
        <div class="absolute inset-0 bg-black/50"></div>
        <div class="relative bg-white dark:bg-gray-900 rounded-xl shadow-2xl border border-gray-200 dark:border-gray-700 max-w-md w-full mx-auto">
            <div class="p-6 border-b border-gray-200 dark:border-gray-700">
                <div class="flex justify-between items-center">
                    <h3 class="text-lg font-bold" id="link-modal-title">添加链接</h3>
                    <button onclick="closeModal('link-modal')" class="text-gray-500 dark:text-gray-400 hover:text-gray-700 dark:hover:text-gray-200 transition-all">
                        <i class="fa fa-times"></i>
                    </button>
                </div>
            </div>
            
            <form id="link-form" class="p-6 space-y-4">
                <input type="hidden" id="link-category-id" value="">
                <input type="hidden" id="link-id" value="">
                
                <div>
                    <label for="link-name" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">链接名称</label>
                    <input type="text" id="link-name" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入链接名称" required>
                </div>
                
                <div>
                    <label for="link-url" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">链接地址</label>
                    <input type="text" id="link-url" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入链接地址" required>
                </div>
                
                <div>
                    <label for="link-favicon" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">图标URL (可选)</label>
                    <input type="text" id="link-favicon" class="w-full px-4 py-2 rounded-lg border border-gray-300 dark:border-gray-700 bg-white dark:bg-gray-800 focus:form-input-focus" placeholder="请输入图标URL">
                </div>
                
                <div class="flex justify-end gap-3 pt-2">
                    <button type="button" onclick="closeModal('link-modal')" class="btn-secondary">
                        取消
                    </button>
                    <button type="submit" class="btn-primary">
                        保存
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        // 登录状态管理
        
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化数据
            initData();
            
            // 应用主题
            applyTheme();
            
            // 初始化登录功能
            initLogin();
            
            // 检查登录状态
            checkLoginStatus();
            
            // 监听自定义背景复选框变化
            document.getElementById('custom-bg').addEventListener('change', function() {
                document.getElementById('bg-image-container').classList.toggle('hidden', !this.checked);
            });
            
            // 监听搜索引擎选择变化
            document.getElementById('search-engine').addEventListener('change', function() {
                document.getElementById('custom-search-container').classList.toggle('hidden', this.value !== 'custom');
            });
            
            // 切换密码显示
            document.getElementById('toggle-password').addEventListener('click', function() {
                const passwordInput = document.getElementById('password');
                const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
                passwordInput.setAttribute('type', type);
                this.innerHTML = type === 'password' ? '<i class="fa fa-eye"></i>' : '<i class="fa fa-eye-slash"></i>';
            });
        });
        
        // 应用主题
        function applyTheme() {
            const savedTheme = localStorage.getItem('theme') || 'auto';
            if (savedTheme === 'dark' || (savedTheme === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.body.classList.add('dark');
            }
            
            // 主题切换
            const themeToggle = document.getElementById('theme-toggle');
            if (themeToggle) {
                themeToggle.addEventListener('click', function() {
                    document.body.classList.toggle('dark');
                    localStorage.setItem('theme', document.body.classList.contains('dark') ? 'dark' : 'light');
                });
            }
        }
        
        // 初始化登录功能
        function initLogin() {
            const loginForm = document.getElementById('login-form');
            if (loginForm) {
                loginForm.addEventListener('submit', function(e) {
                    e.preventDefault();
                    
                    const username = document.getElementById('username').value;
                    const password = document.getElementById('password').value;
                    
                    if (verifyLogin(username, password)) {
                        setLoggedIn(true);
                        isLoggedIn = true;
                        showAdminPanel();
                        showToast('登录成功！');
                    } else {
                        showToast('用户名或密码错误，请使用：admin / admin123', true);
                    }
                });
            }
        }
        
        // 检查登录状态
        function checkLoginStatus() {
            if (window.isLoggedIn()) {
                
                showAdminPanel();
            } else {
                showLoginForm();
            }
        }
        
        // 显示登录表单
        function showLoginForm() {
            document.getElementById('login-container').classList.remove('hidden');
            document.getElementById('admin-container').classList.add('hidden');
        }
        
        // 显示管理面板
        function showAdminPanel() {
            document.getElementById('login-container').classList.add('hidden');
            document.getElementById('admin-container').classList.remove('hidden');
            
            // 初始化管理功能
            initAdminFunctions();
        }
        
        // 初始化管理功能
        function initAdminFunctions() {
            // 初始化标签页切换
            initTabs();
            
            // 加载网站分类
            loadCategories();
            
            // 加载设置
            loadSettings();
            
            // 初始化导出/导入功能
            initDataManagement();
            
            // 初始化退出登录
            document.getElementById('logout-btn').addEventListener('click', logout);
        }
        
        // 初始化标签页
        function initTabs() {
            const tabs = document.querySelectorAll('.admin-tab');
            tabs.forEach(tab => {
                tab.addEventListener('click', function() {
                    // 移除所有标签页的活跃状态
                    tabs.forEach(t => t.classList.remove('active', 'border-primary', 'text-primary'));
                    
                    // 添加当前标签页的活跃状态
                    this.classList.add('active', 'border-primary', 'text-primary');
                    
                    // 隐藏所有内容区域
                    const contentAreas = document.querySelectorAll('.tab-content');
                    contentAreas.forEach(area => area.classList.add('hidden'));
                    
                    // 显示对应内容区域
                    const targetId = this.getAttribute('data-target');
                    document.getElementById(targetId).classList.remove('hidden');
                });
            });
            
            // 默认激活第一个标签页
            if (tabs.length > 0) {
                tabs[0].click();
            }
        }
        
        // 加载网站分类
        function loadCategories() {
            const categories = getCategories();
            const categoriesList = document.getElementById('categories-list');
            
            if (!categoriesList) return;
            
            categoriesList.innerHTML = '';
            
            if (categories.length === 0) {
                categoriesList.innerHTML = `
                    <div class="text-center py-8 bg-gray-50 dark:bg-gray-800 rounded-lg">
                        <i class="fa fa-folder-open-o text-2xl text-gray-400 mb-2"></i>
                        <p class="text-gray-500 dark:text-gray-400">暂无分类</p>
                        <button onclick="showAddCategoryModal()" class="btn-primary mt-4">
                            <i class="fa fa-plus"></i>
                            <span>添加分类</span>
                        </button>
                    </div>
                `;
                return;
            }
            
            categories.forEach(category => {
                const categoryItem = document.createElement('div');
                categoryItem.className = 'bg-white dark:bg-gray-800 rounded-lg shadow mb-4 overflow-hidden';
                categoryItem.innerHTML = `
                    <div class="p-4 border-b border-gray-200 dark:border-gray-700 flex justify-between items-center">
                        <div class="flex items-center gap-3">
                            <i class="fa ${category.icon || 'fa-folder'} text-xl text-primary"></i>
                            <h3 class="font-bold">${category.name}</h3>
                            <span class="text-sm text-gray-500 dark:text-gray-400">(${category.links.length}个链接)</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="editCategory('${category.id}')" class="btn-secondary p-2">
                                <i class="fa fa-pencil"></i>
                            </button>
                            <button onclick="deleteCategoryConfirm('${category.id}', '${category.name}')" class="btn-danger p-2">
                                <i class="fa fa-trash"></i>
                            </button>
                        </div>
                    </div>
                    <div class="p-4">
                        <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3 links-container" data-category-id="${category.id}">
                            ${renderLinks(category.links, category.id)}
                        </div>
                        <button onclick="showAddLinkModal('${category.id}')" class="mt-3 btn-primary w-full">
                            <i class="fa fa-plus"></i>
                            <span>添加链接</span>
                        </button>
                    </div>
                `;
                categoriesList.appendChild(categoryItem);
            });
        }
        
        // 渲染链接列表
        function renderLinks(links, categoryId) {
            if (!links || links.length === 0) {
                return `
                    <div class="col-span-full text-center py-4 bg-gray-50 dark:bg-gray-700/50 rounded-lg">
                        <p class="text-gray-500 dark:text-gray-400">暂无链接</p>
                    </div>
                `;
            }
            
            return links.map(link => `
                <div class="bg-gray-50 dark:bg-gray-700/50 p-3 rounded-lg flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-full bg-gray-200 dark:bg-gray-600 flex items-center justify-center">
                            ${link.favicon ? `<img src="${link.favicon}" class="w-6 h-6 object-cover rounded-full">` : `<span class="text-sm font-bold">${link.name.charAt(0).toUpperCase()}</span>`}
                        </div>
                        <div>
                            <p class="font-medium text-sm">${link.name}</p>
                            <p class="text-xs text-gray-500 dark:text-gray-400 truncate max-w-[150px]">${link.url}</p>
                        </div>
                    </div>
                    <div class="flex gap-1">
                        <button onclick="editLink('${categoryId}', '${link.id}')" class="btn-secondary p-1.5 text-xs">
                            <i class="fa fa-pencil"></i>
                        </button>
                        <button onclick="deleteLinkConfirm('${categoryId}', '${link.id}', '${link.name}')" class="btn-danger p-1.5 text-xs">
                            <i class="fa fa-trash"></i>
                        </button>
                    </div>
                </div>
            `).join('');
        }
        
        // 显示添加分类模态框
        function showAddCategoryModal() {
            const modal = document.getElementById('category-modal');
            const modalTitle = document.getElementById('category-modal-title');
            const categoryForm = document.getElementById('category-form');
            
            modalTitle.textContent = '添加分类';
            categoryForm.reset();
            document.getElementById('category-id').value = '';
            document.getElementById('category-icon').value = 'fa-folder';
            modal.classList.remove('hidden');
        }
        
        // 编辑分类
        function editCategory(categoryId) {
            const categories = getCategories();
            const category = categories.find(c => c.id === categoryId);
            
            if (!category) return;
            
            const modal = document.getElementById('category-modal');
            const modalTitle = document.getElementById('category-modal-title');
            
            modalTitle.textContent = '编辑分类';
            document.getElementById('category-id').value = category.id;
            document.getElementById('category-name').value = category.name;
            document.getElementById('category-icon').value = category.icon || 'fa-folder';
            
            modal.classList.remove('hidden');
        }
        
        // 删除分类确认
        function deleteCategoryConfirm(categoryId, categoryName) {
            if (confirm(`确定要删除分类「${categoryName}」吗？所有相关链接也将被删除。`)) {
                deleteCategory(categoryId);
                loadCategories();
                showToast('分类已删除');
            }
        }
        
        // 显示添加链接模态框
        function showAddLinkModal(categoryId) {
            const modal = document.getElementById('link-modal');
            const modalTitle = document.getElementById('link-modal-title');
            const linkForm = document.getElementById('link-form');
            
            modalTitle.textContent = '添加链接';
            linkForm.reset();
            document.getElementById('link-category-id').value = categoryId;
            document.getElementById('link-id').value = '';
            modal.classList.remove('hidden');
        }
        
        // 编辑链接
        function editLink(categoryId, linkId) {
            const categories = getCategories();
            const category = categories.find(c => c.id === categoryId);
            
            if (!category) return;
            
            const link = category.links.find(l => l.id === linkId);
            if (!link) return;
            
            const modal = document.getElementById('link-modal');
            const modalTitle = document.getElementById('link-modal-title');
            
            modalTitle.textContent = '编辑链接';
            document.getElementById('link-category-id').value = categoryId;
            document.getElementById('link-id').value = link.id;
            document.getElementById('link-name').value = link.name;
            document.getElementById('link-url').value = link.url;
            document.getElementById('link-favicon').value = link.favicon || '';
            
            modal.classList.remove('hidden');
        }
        
        // 删除链接确认
        function deleteLinkConfirm(categoryId, linkId, linkName) {
            if (confirm(`确定要删除链接「${linkName}」吗？`)) {
                deleteLink(categoryId, linkId);
                loadCategories();
                showToast('链接已删除');
            }
        }
        
        // 关闭模态框
        function closeModal(modalId) {
            document.getElementById(modalId).classList.add('hidden');
        }
        
        // 加载设置
        function loadSettings() {
            // 加载联系信息
            const contactInfo = getContactInfo();
            document.getElementById('wechat-input').value = contactInfo.wechat || '';
            document.getElementById('qq-input').value = contactInfo.qq || '';
            
            // 加载主题设置
            const themeSettings = getThemeSettings();
            document.getElementById('default-theme').value = themeSettings.defaultTheme || 'auto';
            document.getElementById('custom-bg').checked = themeSettings.customBackground || false;
            document.getElementById('bg-image').value = themeSettings.backgroundImage || '';
            document.getElementById('bg-image-container').classList.toggle('hidden', !themeSettings.customBackground);
            
            // 加载搜索设置
            const searchSettings = getSearchSettings();
            document.getElementById('search-engine').value = searchSettings.defaultEngine || 'baidu';
            document.getElementById('custom-search-url').value = searchSettings.customSearchUrl || '';
            document.getElementById('custom-search-container').classList.toggle('hidden', searchSettings.defaultEngine !== 'custom');
        }
        
        // 保存联系信息
        function saveContactInfo() {
            const wechat = document.getElementById('wechat-input').value;
            const qq = document.getElementById('qq-input').value;
            
            saveContactInfo({ wechat, qq });
            showToast('联系信息已保存');
        }
        
        // 保存主题设置
        function saveThemeSettings() {
            const defaultTheme = document.getElementById('default-theme').value;
            const customBackground = document.getElementById('custom-bg').checked;
            const backgroundImage = document.getElementById('bg-image').value;
            
            saveThemeSettings({ defaultTheme, customBackground, backgroundImage });
            showToast('主题设置已保存');
        }
        
        // 保存搜索设置
        function saveSearchSettings() {
            const defaultEngine = document.getElementById('search-engine').value;
            const customSearchUrl = document.getElementById('custom-search-url').value;
            
            saveSearchSettings({ defaultEngine, customSearchUrl });
            showToast('搜索设置已保存');
        }
        
        // 初始化数据管理功能
        function initDataManagement() {
            // 导出数据
            document.getElementById('export-btn').addEventListener('click', function() {
                exportData();
                showToast('数据导出成功');
            });
            
            // 导入数据
            document.getElementById('import-input').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    importData(file)
                        .then(() => {
                            showToast('数据导入成功');
                            loadCategories();
                            loadSettings();
                            // 重置文件输入
                            this.value = '';
                        })
                        .catch(error => {
                            showToast(error.message, true);
                        });
                }
            });
            
            // 清空数据
            document.getElementById('clear-data-btn').addEventListener('click', function() {
                if (clearAllData()) {
                    showToast('数据已清空');
                    loadCategories();
                    loadSettings();
                }
            });
        }
        
        // 退出登录
        function logout() {
            if (confirm('确定要退出登录吗？')) {
                setLoggedIn(false);
        
                showLoginForm();
                showToast('已退出登录');
            }
        }
        
        // 表单提交处理
        document.addEventListener('DOMContentLoaded', function() {
            // 分类表单提交
            document.getElementById('category-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const categoryId = document.getElementById('category-id').value;
                const categoryName = document.getElementById('category-name').value;
                const categoryIcon = document.getElementById('category-icon').value;
                
                if (!categoryName.trim()) {
                    showToast('请输入分类名称', true);
                    return;
                }
                
                if (categoryId) {
                    // 更新分类
                    const categories = getCategories();
                    const category = categories.find(c => c.id === categoryId);
                    if (category) {
                        category.name = categoryName;
                        category.icon = categoryIcon;
                        updateCategory(category);
                    }
                } else {
                    // 添加分类
                    addCategory({ name: categoryName, icon: categoryIcon, links: [] });
                }
                
                loadCategories();
                closeModal('category-modal');
                showToast(categoryId ? '分类已更新' : '分类已添加');
            });
            
            // 链接表单提交
            document.getElementById('link-form').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const categoryId = document.getElementById('link-category-id').value;
                const linkId = document.getElementById('link-id').value;
                const linkName = document.getElementById('link-name').value;
                const linkUrl = document.getElementById('link-url').value;
                const linkFavicon = document.getElementById('link-favicon').value;
                
                if (!linkName.trim()) {
                    showToast('请输入链接名称', true);
                    return;
                }
                
                if (!linkUrl.trim()) {
                    showToast('请输入链接地址', true);
                    return;
                }
                
                // 确保URL格式正确
                let formattedUrl = linkUrl;
                if (!formattedUrl.startsWith('http://') && !formattedUrl.startsWith('https://')) {
                    formattedUrl = 'http://' + formattedUrl;
                }
                
                const linkData = {
                    name: linkName,
                    url: formattedUrl,
                    favicon: linkFavicon.trim() || ''
                };
                
                if (linkId) {
                    // 更新链接
                    linkData.id = linkId;
                    updateLink(categoryId, linkData);
                } else {
                    // 添加链接
                    addLink(categoryId, linkData);
                }
                
                loadCategories();
                closeModal('link-modal');
                showToast(linkId ? '链接已更新' : '链接已添加');
            });
        });
        
        // 显示提示框
        function showToast(message, isError = false) {
            // 检查是否已存在toast，存在则移除
            const existingToast = document.getElementById('toast-notification');
            if (existingToast) {
                existingToast.remove();
            }

            // 创建新的toast
            const toast = document.createElement('div');
            toast.id = 'toast-notification';
            toast.className = `fixed top-20 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg text-white font-medium shadow-lg z-50 transition-all duration-300 opacity-0`;
            toast.style.backgroundColor = isError ? '#ef4444' : '#10b981';
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            // 显示toast
            setTimeout(() => {
                toast.classList.add('opacity-100');
            }, 10);
            
            // 3秒后隐藏toast
            setTimeout(() => {
                toast.classList.remove('opacity-100');
                setTimeout(() => {
                    toast.remove();
                }, 300);
            }, 3000);
        }
    </script>
</body>
</html>
